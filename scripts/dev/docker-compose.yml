# docker-compose for local development (manju)
# usage:
#   cd scripts/dev
#   cp .env.example .env.local
#   ./jwtgen.sh          # 生成 secrets/jwt-{private,public}.pem
#   docker compose up -d
#
# 服务:
#   postgres-16      :5432  (db=manju, user=manju, pass=manju)
#   redis-7          :6379
#   minio            :9000 (s3 api), :9001 (console)
#   auth-service     :8001
#   project-service  :8002
#   script-service   :8003
#   asset-service    :8004
#   ai-gateway       :8005
#
# 数据卷: ./data/{pg,redis,minio} — 已 gitignore.

name: manju-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: manju-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-manju}
      POSTGRES_USER: ${POSTGRES_USER:-manju}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-manju}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-manju} -d ${POSTGRES_DB:-manju}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [manju]

  redis:
    image: redis:7-alpine
    container_name: manju-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [manju]

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: manju-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-manjuadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-manjuadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [manju]

  auth-service:
    build:
      context: ../../services/auth-service
      dockerfile: Dockerfile
    image: manju/auth-service:dev
    container_name: manju-auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENV: local
      HTTP_ADDR: ":8001"
      DATABASE_URL: "postgres://${POSTGRES_USER:-manju}:${POSTGRES_PASSWORD:-manju}@postgres:5432/${POSTGRES_DB:-manju}?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt-public.pem
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 720h
      JWT_ISSUER: manju-auth
      LOGIN_RATE_PER_5MIN: 5
      REGISTER_RATE_PER_HOUR: 3
      BCRYPT_COST: 12
    ports:
      - "8001:8001"
    volumes:
      - ./secrets/jwt-private.pem:/run/secrets/jwt-private.pem:ro
      - ./secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    networks: [manju]

  project-service:
    build:
      context: ../../services/project-service
      dockerfile: Dockerfile
    image: manju/project-service:dev
    container_name: manju-project
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENV: local
      HTTP_ADDR: ":8002"
      DATABASE_URL: "postgres://${POSTGRES_USER:-manju}:${POSTGRES_PASSWORD:-manju}@postgres:5432/${POSTGRES_DB:-manju}?sslmode=disable"
      REDIS_URL: "redis://redis:6379/1"
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt-public.pem
      JWT_ISSUER: manju-auth
      CORS_ORIGINS: "http://localhost:5173,http://localhost:5174"
      LOG_LEVEL: info
    ports:
      - "8002:8002"
    volumes:
      - ./secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [manju]

  script-service:
    build:
      context: ../../services/script-service
      dockerfile: Dockerfile
    image: manju/script-service:dev
    container_name: manju-script
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENV: local
      HTTP_ADDR: ":8003"
      DATABASE_URL: "postgres://${POSTGRES_USER:-manju}:${POSTGRES_PASSWORD:-manju}@postgres:5432/${POSTGRES_DB:-manju}?sslmode=disable"
      REDIS_URL: "redis://redis:6379/2"
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt-public.pem
      JWT_ISSUER: manju-auth
      CORS_ORIGINS: "http://localhost:5173,http://localhost:5174"
      LOG_LEVEL: info
    ports:
      - "8003:8003"
    volumes:
      - ./secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8003/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [manju]

  asset-service:
    build:
      context: ../../services/asset-service
      dockerfile: Dockerfile
    image: manju/asset-service:dev
    container_name: manju-asset
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ENV: local
      HTTP_ADDR: ":8004"
      DATABASE_URL: "postgres://${POSTGRES_USER:-manju}:${POSTGRES_PASSWORD:-manju}@postgres:5432/${POSTGRES_DB:-manju}?sslmode=disable"
      REDIS_URL: "redis://redis:6379/3"
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt-public.pem
      JWT_ISSUER: manju-auth
      CORS_ORIGINS: "http://localhost:5173,http://localhost:5174"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER:-manjuadmin}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-manjuadmin}"
      S3_BUCKET: manju-assets
      S3_REGION: us-east-1
      LOG_LEVEL: info
    ports:
      - "8004:8004"
    volumes:
      - ./secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8004/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [manju]

  ai-gateway:
    build:
      context: ../../services/ai-gateway
      dockerfile: Dockerfile
    image: manju/ai-gateway:dev
    container_name: manju-ai
    restart: unless-stopped
    environment:
      ENV: local
      HTTP_PORT: "8005"
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt-public.pem
      JWT_ISSUER: manju-auth
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-sk-placeholder}"
      ANTHROPIC_MODEL: "claude-sonnet-4-6"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:5174"
      LOG_LEVEL: info
    ports:
      - "8005:8005"
    volumes:
      - ./secrets/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8005/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [manju]

networks:
  manju:
    name: manju-local
