name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src/ --max-warnings=20
      - run: npm run build

  go-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, project-service, script-service, asset-service, render-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: services/${{ matrix.service }}/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test -short ./...

  ai-gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -q --ignore=tests/integration

  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend, go-services, ai-gateway]
    strategy:
      matrix:
        include:
          - context: .
            name: frontend
          - context: services/auth-service
            name: auth-service
          - context: services/project-service
            name: project-service
          - context: services/script-service
            name: script-service
          - context: services/asset-service
            name: asset-service
          - context: services/render-service
            name: render-service
          - context: services/ai-gateway
            name: ai-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-tests:
    runs-on: ubuntu-latest
    needs: [go-services]
    defaults:
      run:
        working-directory: services/render-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: services/render-service/go.sum
      - run: go test -count=1 -timeout 5m ./tests/integration/...
