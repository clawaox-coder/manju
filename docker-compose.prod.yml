services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: manju
      POSTGRES_USER: manju
      POSTGRES_PASSWORD: ${DB_PASSWORD:-manju_prod}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manju"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: services/auth-service
    environment:
      DATABASE_URL: postgres://manju:${DB_PASSWORD:-manju_prod}@postgres:5432/manju?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8001:8001"]

  project-service:
    build: services/project-service
    environment:
      DATABASE_URL: postgres://manju:${DB_PASSWORD:-manju_prod}@postgres:5432/manju?sslmode=disable
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["8002:8002"]

  script-service:
    build: services/script-service
    environment:
      DATABASE_URL: postgres://manju:${DB_PASSWORD:-manju_prod}@postgres:5432/manju?sslmode=disable
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["8003:8003"]

  asset-service:
    build: services/asset-service
    environment:
      DATABASE_URL: postgres://manju:${DB_PASSWORD:-manju_prod}@postgres:5432/manju?sslmode=disable
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: manju-assets
    depends_on:
      postgres: { condition: service_healthy }
      minio: { condition: service_healthy }
    ports: ["8004:8004"]

  ai-gateway:
    build: services/ai-gateway
    environment:
      DATABASE_URL: postgres://manju:${DB_PASSWORD:-manju_prod}@postgres:5432/manju?sslmode=disable
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["8005:8005"]

  render-service:
    build: services/render-service
    environment:
      DATABASE_URL: postgres://manju:${DB_PASSWORD:-manju_prod}@postgres:5432/manju?sslmode=disable
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: manju-renders
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres: { condition: service_healthy }
      minio: { condition: service_healthy }
      kafka: { condition: service_healthy }
    ports: ["8006:8006"]

  render-worker:
    build: services/render-service
    entrypoint: ["/worker"]
    environment:
      DATABASE_URL: postgres://manju:${DB_PASSWORD:-manju_prod}@postgres:5432/manju?sslmode=disable
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: manju-renders
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres: { condition: service_healthy }
      minio: { condition: service_healthy }
      kafka: { condition: service_healthy }

  frontend:
    build: .
    ports: ["80:80"]
    depends_on:
      - auth-service
      - project-service

volumes:
  pg_data:
  minio_data:
