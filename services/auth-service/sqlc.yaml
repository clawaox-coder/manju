# sqlc generates Go from queries/*.sql against migrations/*.sql.
# regen: `make sqlc` (in services/auth-service/).

version: "2"
sql:
  - engine: postgresql
    queries: queries
    schema: migrations
    gen:
      go:
        package: db
        out: internal/repo/db
        sql_package: pgx/v5
        emit_json_tags: false
        emit_pointers_for_null_types: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "user_status"
            go_type:
              import: "github.com/manju-org/manju/services/auth-service/internal/repo/db"
              type: "UserStatus"
          - db_type: "team_role"
            go_type:
              import: "github.com/manju-org/manju/services/auth-service/internal/repo/db"
              type: "TeamRole"
          - db_type: "plan_tier"
            go_type:
              import: "github.com/manju-org/manju/services/auth-service/internal/repo/db"
              type: "PlanTier"
